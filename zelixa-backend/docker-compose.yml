services:
  backend:
    build: .
    container_name: zelixa-backend
    restart: always
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/zelixa_db
      - SPRING_DATASOURCE_USERNAME=rizaldi
      - SPRING_DATASOURCE_PASSWORD=15031996
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - DB_URL=jdbc:postgresql://postgres:5432/zelixa_db
      - DB_USERNAME=rizaldi
      - DB_PASSWORD=15031996
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_URL=https://storage.zelixa.my.id
      - MINIO_ACCESS_KEY=rizaldi
      - MINIO_SECRET_KEY=15031996
      - MINIO_BUCKET=zelixa
      - WAHA_URL=http://waha:3000
      - WAHA_SESSION=default
      - WAHA_API_KEY=
    networks:
      - infra-network

networks:
  infra-network:
    external: true
