version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lawfirm-backend
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Database connection (using values from your example)
      DB_URL: jdbc:postgresql://postgres:5432/lawfirm_db
      DB_USERNAME: rizaldi
      DB_PASSWORD: "15031996"
      
      # Redis connection
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      
      # MinIO configuration (matching your storage settings)
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: rizaldi
      MINIO_SECRET_KEY: "15031996"
      MINIO_BUCKET: lawfirm
      
    networks:
      - global-network

networks:
  global-network:
    external: true

