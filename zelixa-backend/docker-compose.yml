version: "3.8"

services:
  backend:
    build: .
    container_name: zelixa-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - zelixa-network

networks:
  infra-network:
    driver: bridge
