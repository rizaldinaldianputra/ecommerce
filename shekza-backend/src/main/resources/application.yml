server:
  port: 8081

spring:
  application:
    name: shekza

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  elasticsearch:
    uris: ${ELASTICSEARCH_URL:http://localhost:9200}

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

app:
  minio:
    url: ${MINIO_URL}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET}

  rajaongkir:
    api-key: ${RAJAONGKIR_API_KEY}
    base-url: ${RAJAONGKIR_BASE_URL}

  midtrans:
    merchant-id: ${MIDTRANS_MERCHANT_ID}
    server-key: ${MIDTRANS_SERVER_KEY}
    client-key: ${MIDTRANS_CLIENT_KEY}
    is-production: ${MIDTRANS_IS_PRODUCTION:false}

  firebase:
    config-path: ${FIREBASE_CONFIG_PATH}

camunda:
  bpm:
    admin-user:
      id: admin
      password: ${CAMUNDA_ADMIN_PASSWORD:admin}
    filter:
      create: All Tasks
    database:
      type: postgres
      schema-update: true
    job-execution:
      enabled: true